name: Deploy to VPS

# Pushes the static site to a VPS over SSH on every commit to main.
# The VPS runs nginx (serving the files) + Tor + the updater timer.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     server IP or hostname (an IP is fine; no domain needed)
#   VPS_USER     ssh user (must own VPS_PATH and be able to reload nginx)
#   VPS_PATH     web root on the server, e.g. /var/www/dojobay
#   VPS_SSH_KEY  a private SSH key whose public half is in the user's authorized_keys
#   VPS_PORT     (optional) ssh port, defaults to 22
#
# NOTE on data/ (stage 2 model): the curated node list lives in data/seed.json,
# which IS synced. data/dojos.json is a GENERATED artifact (seed + approved
# submissions, merged by server/build-public.mjs, statuses filled by the
# updater) and is NOT synced: the VPS owns it. history.json and server/data are
# likewise VPS-owned and excluded, so a deploy can never wipe live status,
# reliability history, or operator submissions. The post-deploy step below
# regenerates dojos.json from the freshly-synced seed on every deploy.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp build version
        run: printf '{"commit":"%s","built":"%s"}\n' "$(echo "$GITHUB_SHA" | cut -c1-7)" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/version.json

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync site to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            --exclude 'data/dojos.json' --exclude 'data/history.json' --exclude 'data/history-daily.json' --exclude 'data/avatars' --exclude 'data/dojobay-src.zip' --exclude 'data/updates' --exclude 'data/backups' --exclude 'server/data' --exclude 'server/node_modules' \
            -e "ssh -p ${{ secrets.VPS_PORT || 22 }} -i ~/.ssh/id_deploy" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"

      - name: Post-deploy (reload nginx, ensure updater timer)
        run: |
          ssh -p "${{ secrets.VPS_PORT || 22 }}" -i ~/.ssh/id_deploy \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd /var/www/dojobay/server && node build-public.mjs || true; node ../scripts/pack-source.mjs || true; sudo systemctl reload nginx && sudo systemctl enable --now dojobay-update.timer; sudo systemctl restart dojobay-server 2>/dev/null || true'
